    <style>
         /* ===== المتغيرات الأساسية ===== */
        :root {
            --primary: #ff6b6b;
            --secondary: #f0f;
            --accent: #6b5bff;
            --bg-dark: #0f0c29;
            --bg-medium: #302b63;
            --bg-light: #24243e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Cairo', 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark), var(--bg-medium), var(--bg-light));
            color: #fff;
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
        }

        /* خلفية متحركة محسّنة */
        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 20% 40%, rgba(255,105,180,0.1) 0%, transparent 30%),
                        radial-gradient(circle at 80% 70%, rgba(106,90,205,0.1) 0%, transparent 30%),
                        radial-gradient(circle at 30% 80%, rgba(255,182,193,0.1) 0%, transparent 30%);
            animation: particleWave 15s infinite alternate;
        }

        @keyframes particleWave {
            0% { filter: hue-rotate(0deg) blur(0px); }
            100% { filter: hue-rotate(30deg) blur(2px); }
        }
        /* ===== شريط التنقل الذكي ===== */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 5%;
            background: rgba(10, 10, 30, 0.6);
            backdrop-filter: blur(15px) saturate(200%);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
            transition: 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
