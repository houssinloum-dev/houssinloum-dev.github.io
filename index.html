    <title>LinguaVerse Pro - تعلم اللغات باحترافية</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
         /* ===== المتغيرات الأساسية ===== */
        :root {
            --primary: #ff6b6b;
            --secondary: #f0f;
            --accent: #6b5bff;
            --bg-dark: #0f0c29;
            --bg-medium: #302b63;
            --bg-light: #24243e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Cairo', 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark), var(--bg-medium), var(--bg-light));
            color: #fff;
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
        }
        /* خلفية متحركة محسّنة */
        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 20% 40%, rgba(255,105,180,0.1) 0%, transparent 30%),
                        radial-gradient(circle at 80% 70%, rgba(106,90,205,0.1) 0%, transparent 30%),
                        radial-gradient(circle at 30% 80%, rgba(255,182,193,0.1) 0%, transparent 30%);
            animation: particleWave 15s infinite alternate;
        }

        @keyframes particleWave {
            0% { filter: hue-rotate(0deg) blur(0px); }
            100% { filter: hue-rotate(30deg) blur(2px); }
        }
  /* ===== شريط التنقل الذكي ===== */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 5%;
            background: rgba(10, 10, 30, 0.6);
            backdrop-filter: blur(15px) saturate(200%);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
            transition: 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .navbar.scrolled {
            background: rgba(5, 5, 20, 0.9);
            padding: 0.7rem 5%;
            box-shadow: 0 10px 40px rgba(255,105,180,0.2);
        }

        .logo {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(45deg, var(--primary), var(--secondary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            margin: 0 1.2rem;
            font-weight: 600;
            transition: 0.3s;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -6px;
            left: 0;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transition: width 0.3s;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .btn {
            padding: 0.7rem 2rem;
            border: none;
            border-radius: 50px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 5px 20px rgba(255,105,180,0.4);
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 15px 30px var(--secondary);
        }
         /* ===== قسم البطل (Hero) ===== */
        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 3rem 5%;
            min-height: 85vh;
            flex-wrap: wrap;
        }

        .hero-content {
            flex: 1 1 400px;
            animation: fadeUp 1s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero-content h1 {
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 900;
            line-height: 1.2;
            margin-bottom: 1rem;
        }

        .hero-content .highlight {
            background: linear-gradient(45deg, var(--primary), var(--secondary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        .hero-stats {
            display: flex;
            gap: 2rem;
            margin: 2rem 0;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--primary);
            text-shadow: 0 0 20px var(--secondary);
        }

        .hero-image {
            flex: 1 1 300px;
            text-align: center;
            animation: float 6s infinite alternate;
        }

        @keyframes float {
            from { transform: translateY(0); }
            to { transform: translateY(-20px); }
        }
 /* ===== شريط التعرف على الجهاز ===== */
        .device-bar {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            padding: 0.7rem 5%;
            text-align: center;
            font-size: 0.95rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: none; /* يظهر حسب الجهاز */
        }

        .device-bar i {
            margin-left: 0.5rem;
            color: var(--primary);
        }
         /* ===== قسم اللغات (شبكة) ===== */
        .languages {
            padding: 5rem 5%;
            text-align: center;
        }

        .section-title {
            font-size: clamp(2rem, 5vw, 2.8rem);
            margin-bottom: 2rem;
            position: relative;
            display: inline-block;
        }

        .section-title::after {
            content: '';
            position: absolute;
            width: 70%;
            height: 4px;
            bottom: -10px;
            left: 15%;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
            border-radius: 2px;
        }

        .lang-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.5rem;
            margin: 3rem 0;
        }

        .lang-card {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, var(--primary), var(--secondary));
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.3rem;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.3);
            color: white;
        }

        .lang-card:hover {
            transform: scale(1.15) rotate(5deg);
            box-shadow: 0 0 50px var(--secondary);
            border-color: white;
        }

        .lang-card.active {
            border: 4px solid white;
            box-shadow: 0 0 60px var(--primary);
        }

        .lang-card i {
            font-size: 2.5rem;
            margin-bottom: 0.3rem;
        }
        
  /* ===== شبكة الفيديو (4 لكل لغة) ===== */
        .video-section {
            padding: 3rem 5%;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .video-card {
            background: rgba(20, 20, 40, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 1.2rem;
            transition: 0.4s;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .video-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(255,105,180,0.3);
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: 15px;
            margin-bottom: 0.8rem;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 15px;
        }

        .video-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 0.5rem 0;
        }

        /* ===== قسم الكتب المحسّن ===== */
        .books-section {
            padding: 5rem 5%;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            margin: 3rem 5%;
        }

        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2.5rem;
            margin-top: 3rem;
        }

        .book-card {
            background: rgba(30, 30, 60, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 30px;
            padding: 2rem;
            transition: 0.4s;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .book-card:hover {
            transform: translateY(-15px);
            border-color: var(--primary);
            box-shadow: 0 25px 45px rgba(255,105,180,0.4);
        }

        .book-icon {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .book-title {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .book-author {
            color: var(--secondary);
            margin-bottom: 1rem;
        }

        .book-meta {
            display: flex;
            gap: 1rem;
            margin: 1rem 0;
            color: #ccc;
        }

        .download-btn {
            display: inline-block;
            padding: 0.8rem 1.5rem;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: 0.3s;
            width: 100%;
            text-align: center;
            border: none;
            cursor: pointer;
        }
